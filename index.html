<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title></title>
    <link rel="stylesheet" href="style.css?v=20260528-2" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1 data-i18n="heading"></h1>
        <p class="sub" id="intro-blurb">
          <span data-i18n="introPrefix"></span>
          <strong id="intro-dims">480×800</strong>
          <span data-i18n="introSuffix"></span>
        </p>

        <p id="upload-error" class="upload-error" hidden></p>

        <label
          class="dropzone"
          id="dropzone"
          tabindex="0"
          role="button"
          aria-label=""
          data-i18n-attr="aria-label:uploadImages"
        >
          <p data-i18n="dropText"></p>
          <p class="hint" data-i18n="dropHint"></p>
          <span class="btn-secondary" data-i18n="chooseFiles"></span>
          <input
            id="file-input"
            class="file-input--hidden"
            type="file"
            accept="image/*"
            multiple
          />
        </label>

        <div class="field">
          <label for="device" data-i18n="device"></label>
          <select id="device">
            <option value="x4" selected data-i18n="deviceX4"></option>
            <option value="x3" data-i18n="deviceX3"></option>
          </select>
        </div>

        <div class="field">
          <label for="orientation" data-i18n="deviceFrame"></label>
          <select id="orientation">
            <option value="portrait" selected></option>
            <option value="landscape"></option>
          </select>
        </div>

        <div class="field">
          <label for="fit-mode" data-i18n="fit"></label>
          <select id="fit-mode">
            <option value="cover" selected data-i18n="fitCover"></option>
            <option value="contain" data-i18n="fitContain"></option>
            <option value="stretch" data-i18n="fitStretch"></option>
          </select>
        </div>

        <div class="field">
          <label for="scale">
            <span data-i18n="scale"></span> <span id="scale-val">100%</span>
          </label>
          <input id="scale" type="range" min="50" max="200" value="100" />
        </div>

        <div class="row-2">
          <div class="field">
            <label for="offset-x">
              <span data-i18n="panX"></span> <span id="offset-x-val">0</span>
            </label>
            <input id="offset-x" type="range" min="-100" max="100" value="0" />
          </div>
          <div class="field">
            <label for="offset-y">
              <span data-i18n="panY"></span> <span id="offset-y-val">0</span>
            </label>
            <input id="offset-y" type="range" min="-100" max="100" value="0" />
          </div>
        </div>
        <p id="pan-hint" class="field-hint" hidden>
          <span data-i18n="panHint"></span>
        </p>

        <label class="check">
          <input type="checkbox" id="eink" checked />
          <span data-i18n="eink"></span>
        </label>
        <label class="check check--spaced">
          <input type="checkbox" id="dither" />
          <span data-i18n="dither"></span>
        </label>

        <div class="actions">
          <button type="button" class="ghost" id="reset-transform" data-i18n="reset"></button>
          <button type="button" class="primary" id="download-bmp" disabled data-i18n="download"></button>
        </div>

        <div class="queue-toolbar">
          <p class="sub sub--queue-heading" data-i18n="queue"></p>
          <div class="queue-actions">
            <button type="button" class="ghost ghost--sm" id="duplicate-active" disabled data-i18n="duplicate"></button>
            <button type="button" class="ghost ghost--sm" id="clear-queue" disabled data-i18n="clearAll"></button>
          </div>
        </div>
        <div class="thumb-list" id="thumb-list"></div>
      </aside>

      <main class="stage-wrap">
        <div
          class="device"
          aria-label=""
          data-i18n-attr="aria-label:devicePreviewFrame"
        >
          <div class="device-notch" aria-hidden="true"></div>
          <div class="device-bezel" id="preview-bezel">
            <img
              id="preview-img"
              class="device-screen"
              draggable="false"
              alt=""
              data-i18n-attr="alt:previewAlt"
              width="480"
              height="800"
              hidden
            />
          </div>
        </div>
        <p class="spec-pill" id="spec-pill"></p>
        <p id="empty-stage" class="empty-stage" data-i18n="emptyStage"></p>
      </main>
    </div>
    <script src="app.js?v=20260528-2"></script>
  </body>
</html>
